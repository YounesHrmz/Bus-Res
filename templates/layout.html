<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Bus Reservation</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="page">
<nav class="navbar">
    <div class="nav-left">
        <a href="{{ url_for('index') }}" class="nav-brand">Bus Reservation</a>
    </div>
    <div class="nav-right">
        <a href="{{ url_for('add_bus') }}" class="btn btn-outline">Add Bus</a>
        <a href="{{ url_for('cancel_reservation') }}" class="btn btn-info">Cancel Reservation</a>
    </div>
</nav>

<div class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
</div>
</body>
</html>
